// ══════════════════════════════════════════
// AUTH-PROTECTED AI CALL
// FIX: now correctly passes max_tokens so the
// serverless function respects it (was defaulting to 1000)
// ══════════════════════════════════════════
async function callAI(prompt, system, tokens=2000){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return"Please log in to use AI features.";
    const res=await fetch("/api/ai",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},
      body:JSON.stringify({
        max_tokens:tokens,
        system:system||"",
        messages:[{role:"user",content:prompt}]
      }),
    });
    const data=await res.json();
    if(!res.ok){
      console.error("[callAI] API error",res.status,data);
      return"AI error: "+(data.detail||data.error||res.status);
    }
    return data.content?.map(b=>b.text||"").join("\n")||"";
  }catch(e){
    console.error("[callAI] Exception",e);
    return"AI unavailable: "+e.message;
  }
}

function useRouter(){
  const[route,setRoute]=useState(window.location.hash.slice(1)||"/");
  useEffect(()=>{
    const h=()=>setRoute(window.location.hash.slice(1)||"/");
    window.addEventListener("hashchange",h);
    return()=>window.removeEventListener("hashchange",h);
  },[]);
  return route;
}
function go(path){window.location.hash=path}

// ══════════════════════════════════════════
// AUTH HOOK
// ══════════════════════════════════════════
function useAuth(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);
  return{user,loading};
}

function AuthPage({mode}){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);
  const[confirmSent,setConfirmSent]=useState(false);
  const isLogin=mode==="login";

  const handleSubmit=async()=>{
    if(!email||!password){setError("Email and password are required.");return;}
    if(password.length<6){setError("Password must be at least 6 characters.");return;}
    setLoading(true);setError("");
    try{
      if(isLogin){
        const{error:e}=await sb.auth.signInWithPassword({email,password});
        if(e)throw e;
        go("/dashboard");
      }else{
        const{error:e}=await sb.auth.signUp({email,password});
        if(e)throw e;
        setConfirmSent(true);
      }
    }catch(e){setError(e.message||"Something went wrong.");}
    setLoading(false);
  };

  if(confirmSent){
    return(
      <div style={{minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{maxWidth:400,textAlign:"center",padding:32}}>
          <div style={{fontSize:48,marginBottom:16}}>📧</div>
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>Check your email</h2>
          <p style={{color:C.muted,fontSize:14,marginBottom:24,lineHeight:1.6}}>We sent a confirmation link to <strong>{email}</strong>. Click it to activate your account, then come back and log in.</p>
          <button className="btn btn-p" onClick={()=>go("/login")}>Go to Login</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{maxWidth:400,width:"100%",padding:24}}>
        <div style={{textAlign:"center",marginBottom:24}}><Logo onClick={()=>go("/")}/></div>
        <div className="card" style={{padding:28}}>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>{isLogin?"Welcome back":"Create your account"}</h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:20}}>{isLogin?"Log in to access your stakeholder maps.":"Start mapping your stakeholders for free."}</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><label className="label">Email</label><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="jane@company.com" onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>
            <div><label className="label">Password</label><input className="inp" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder={isLogin?"Your password":"Min. 6 characters"} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>
            {error&&<div className="error-msg">{error}</div>}
            <button className="btn btn-p btn-block" onClick={handleSubmit} disabled={loading} style={{marginTop:4}}>

            {isLogin?<>Don't have an account? <a href="#/signup">Sign up</a></>:<>Already have an account? <a href="#/login">Log in</a></>}

       filtered.length===0?
        <div style={{textAlign:"center",padding:48}}>
          <div style={{fontSize:48,marginBottom:12}}>🗺️</div>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:8}}>{maps.length===0?"No maps yet":"No maps in this category"}</h3>
          <p style={{color:C.muted,fontSize:14,marginBottom:20}}>Create your first stakeholder map to get started.</p>
          {maps.length===0&&<button className="btn btn-p" onClick={()=>setShowCreate(true)}>+ Create Your First Map</button>}
        </div>
       :
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
          {filtered.map(m=>{
            const mt=MAP_TYPES[m.type]||MAP_TYPES.project;
            const sh=m.stakeholders||[];
            const qCounts={"Manage Closely":0,"Keep Satisfied":0,"Keep Informed":0,"Monitor":0};
            sh.forEach(s=>{ const q=s.quadrant||classify(s.influence||50,s.interest||50); qCounts[q]=(qCounts[q]||0)+1; });
            return(
              <div key={m.id} className="card" onClick={()=>go("/map/"+m.id)} style={{cursor:"pointer",transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <span className="badge" style={{background:mt.color+"18",color:mt.color,marginBottom:6}}>{mt.icon} {mt.label}</span>
                    <h3 style={{fontSize:16,fontWeight:700,marginTop:6}}>{m.name}</h3>
                  </div>
                  <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();deleteMap(m.id)}}>🗑️</button>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  {Object.entries(qCounts).map(([q,c])=>c>0&&(
                    <span key={q} style={{fontSize:11,color:QUAD[q].color,fontWeight:600}}>{QUAD[q].icon}{c}</span>
                  ))}
                </div>
                <div style={{fontSize:12,color:C.dim}}>
                  {sh.length} stakeholder{sh.length!==1?"s":""} · Updated {new Date(m.updated_at).toLocaleDateString()}
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

// MAP EDITOR
// ══════════════════════════════════════════
function MapEditor({mapId,user}){
  const[map,setMap]=useState(null);
  const[stakeholders,setStakeholders]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[tab,setTab]=useState("map");
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);

  // ── BUG 1 FIX: analysisMode is read directly in the generate onClick
  // so it always captures fresh state (no stale closure) ──
  const[analysisMode,setAnalysisMode]=useState("strategy");
  const[analysis,setAnalysis]=useState("");
  const[analysisLoading,setAnalysisLoading]=useState(false);

  const[draftTarget,setDraftTarget]=useState(null);
  const[draftText,setDraftText]=useState("");
  const[draftLoading,setDraftLoading]=useState(false);
  const[draftContext,setDraftContext]=useState("");

  const[importText,setImportText]=useState("");
  const[importLoading,setImportLoading]=useState(false);
  const[importStatus,setImportStatus]=useState(null); // {type:"success"|"warning", msg:"..."}

  const saveTimer=useRef(null);

  useEffect(()=>{loadMap()},[mapId]);

  const loadMap=async()=>{
    setLoading(true);
    const{data,error}=await sb.from("maps").select("*").eq("id",mapId).single();
    if(!error&&data){setMap(data);setStakeholders(data.stakeholders||[]);}
    else go("/dashboard");
    setLoading(false);
  };

  const saveStakeholders=useCallback((newList)=>{
    setStakeholders(newList);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      setSaving(true);
      await sb.from("maps").update({stakeholders:newList,updated_at:new Date().toISOString()}).eq("id",mapId);
      setSaving(false);
    },1000);
  },[mapId]);

  const addStakeholder=(s)=>{
    if(editing){
      saveStakeholders(stakeholders.map(p=>p.id===editing.id?{...s,id:editing.id}:p));
      setEditing(null);
    }else{
      saveStakeholders([...stakeholders,{...s,id:Date.now().toString()}]);
    }
    setShowForm(false);
  };

  const deleteStakeholder=(id)=>{
    saveStakeholders(stakeholders.filter(p=>p.id!==id));
    if(selected===id)setSelected(null);
  };

  const importStakeholders=(list)=>{
    const newOnes=list.map((s,i)=>({
      ...s,
      id:(Date.now()+i).toString(),
      quadrant:classify(s.influence??50, s.interest??50)
    }));
    saveStakeholders([...stakeholders,...newOnes]);
  };

  // ── BUG 2 FIX: robust AI import with better prompt + better fallback ──
  const runImport=async()=>{
    setImportLoading(true);
    setImportStatus(null);

    const aiPrompt=`Extract stakeholders from the text below. Return ONLY a raw JSON array — no markdown, no explanation, no backticks.

Each object must have:
- "name": string (full name)
- "role": string (job title or role, empty string if unknown)  
- "department": string (empty string if unknown)
- "influence": integer 0-100 (how much power/authority they have over this initiative)
- "interest": integer 0-100 (how much they care about or are affected by this initiative)
- "sentiment": one of "champion","supportive","neutral","resistant","blocker"
- "notes": string (key context, empty string if none)

Scoring rules — DO NOT default to 50 unless truly unknown:
- CEO/Board/Executive Sponsor → influence 85-95
- CFO/COO/CTO/VP/Director → influence 70-85
- Senior Manager → influence 55-70
- Manager/Team Lead → influence 40-55
- Individual Contributor → influence 20-40
- "doesn't care"/"low priority"/"peripheral" → interest 15-30
- "key stakeholder"/"champion"/"directly impacted"/"depends on this" → interest 75-90
- "somewhat interested"/"aware" → interest 40-60
- Words like "skeptical","concerned","worried" → sentiment resistant
- Words like "loves it","eager","pushing for it" → sentiment supportive or champion
- Words like "blocking","won't agree","against" → sentiment blocker

Text to parse:
${importText}`;

    const result=await callAI(aiPrompt,"You are a JSON data extractor. Return ONLY a valid JSON array. No other text.",4096);
    console.log("[Import] AI raw response:",result);

    // Try to parse AI response
    let parsed=null;
    if(!result.startsWith("AI")){
      try{
        const cleaned=result.replace(/```json|```/g,"").trim();
        const candidate=JSON.parse(cleaned);
        if(Array.isArray(candidate)&&candidate.length>0){
          parsed=candidate;
          console.log("[Import] ✅ AI parsed",parsed.length,"stakeholders");
        }
      }catch(e){
        console.warn("[Import] JSON parse failed:",e.message,"Raw:",result.slice(0,200));
      }
    }

    if(parsed){
      // Clamp and validate
      const validated=parsed.map((s,i)=>({
        name:String(s.name||"Stakeholder "+(i+1)).trim(),
        role:String(s.role||"").trim(),
        department:String(s.department||"").trim(),
        influence:Math.min(100,Math.max(0,Math.round(Number(s.influence)||50))),
        interest:Math.min(100,Math.max(0,Math.round(Number(s.interest)||50))),
        sentiment:["champion","supportive","neutral","resistant","blocker"].includes(s.sentiment)?s.sentiment:"neutral",
        notes:String(s.notes||"").trim(),
      }));
      importStakeholders(validated);
      setImportText("");
      setImportStatus({type:"success",msg:`✅ AI imported ${validated.length} stakeholder${validated.length!==1?"s":""}.`});
    }else{
      // ── Enhanced fallback parser ──
      console.warn("[Import] ⚠️ AI failed, using fallback parser");
      const lines=importText.split("\n").map(l=>l.replace(/^\d+[\.)]\s*/,"").trim()).filter(l=>l.length>2);
      const fallback=lines.map((line,i)=>{
        const lower=line.toLowerCase();
        const parts=line.split(/\s*[—–\-]\s*/);
        const nameRaw=(parts[0]||"").trim();
        const name=nameRaw||"Stakeholder "+(i+1);
        const roleRaw=(parts[1]||"").split(",")[0].trim();

        // Numeric extraction: "influence: 80" or "influence 80"
        const infNumMatch=lower.match(/inf(?:luence)?[:\s=]+(\d+)/);
        const intNumMatch=lower.match(/int(?:erest)?[:\s=]+(\d+)/);
        let inf=infNumMatch?parseInt(infNumMatch[1]):null;
        let int=intNumMatch?parseInt(intNumMatch[1]):null;

        // Title-based inference for influence
        if(inf===null){
          if(/\b(ceo|cfo|cto|coo|board|executive sponsor|president)\b/.test(lower)) inf=88;
          else if(/\b(vp|vice president|director|svp|evp)\b/.test(lower)) inf=75;
          else if(/\bsenior manager\b/.test(lower)) inf=62;
          else if(/\bmanager\b/.test(lower)) inf=50;
          else if(/\b(very high influence|very high power|extremely influential)\b/.test(lower)) inf=88;
          else if(/\b(high influence|high power|very influential|influential)\b/.test(lower)) inf=72;
          else if(/\b(low influence|little power|peripheral)\b/.test(lower)) inf=22;
          else inf=50;
        }

        // Interest keyword inference
        if(int===null){
          if(/\b(champion|sponsor|key stakeholder|directly impacted|depends on this)\b/.test(lower)) int=85;
          else if(/\b(very high interest|very invested|highly engaged)\b/.test(lower)) int=85;
          else if(/\b(high interest|invested|engaged|cares about)\b/.test(lower)) int=70;
          else if(/\b(doesn't care|low interest|not interested|low priority|peripheral|monitor only)\b/.test(lower)) int=20;
          else if(/\b(low interest)\b/.test(lower)) int=25;
          else int=50;
        }

        let sent="neutral";
        if(/\b(champion|loves it|pushing for|eager|enthusiastic)\b/.test(lower)) sent="champion";
        else if(/\b(supportive|supports|backing|on board|positive)\b/.test(lower)) sent="supportive";
        else if(/\b(blocking|won't agree|against|refuses|veto)\b/.test(lower)) sent="blocker";
        else if(/\b(resistant|resistant|skeptical|concerned|worried|unhappy|opposed)\b/.test(lower)) sent="resistant";

        return{
          name,
          role:roleRaw,
          department:"",
          influence:Math.min(100,Math.max(0,inf)),
          interest:Math.min(100,Math.max(0,int)),
          sentiment:sent,
          notes:parts.slice(1).join(" — ").trim(),
        };
      });

      if(fallback.length>0){
        importStakeholders(fallback);
        setImportText("");
        const flatCount=fallback.filter(s=>s.influence===50&&s.interest===50).length;
        setImportStatus({
          type:"warning",
          msg:`⚠️ AI unavailable — used text parser. ${flatCount>0?`${flatCount} stakeholder${flatCount!==1?"s":""} have default 50/50 scores — adjust manually.`:""} Imported ${fallback.length} total.`
        });
      }else{
        setImportStatus({type:"warning",msg:"Could not parse. Try: Name — Role, description (one per line)"});
      }
    }
    setImportLoading(false);
  };

  if(loading)return<div style={{textAlign:"center",padding:80,color:C.dim}}>Loading map...</div>;
  if(!map)return<div style={{textAlign:"center",padding:80,color:C.dim}}>Map not found.</div>;

  const filtered=filter?stakeholders.filter(s=>s.quadrant===filter):stakeholders;
  const mt=MAP_TYPES[map.type]||MAP_TYPES.project;
  const counts={"Manage Closely":0,"Keep Satisfied":0,"Keep Informed":0,"Monitor":0};
  stakeholders.forEach(s=>counts[s.quadrant]=(counts[s.quadrant]||0)+1);

  // ── BUG 1 FIX: analysis prompts defined outside onClick so they're readable,
  // but analysisMode is captured fresh at click time because it's in scope ──
  const ANALYSIS_PROMPTS={
    strategy:"Analyze this stakeholder landscape and provide:\n1. Top 3 engagement priorities (who to focus on first and why)\n2. Key risks from misaligned or resistant stakeholders\n3. Coalition opportunities (who can influence whom)\n4. 3 concrete quick wins for the next 30 days\n\nBe specific and actionable. Use **bold** for key names and actions.",
    comms:"Create a communication plan organized by quadrant:\n\n**Manage Closely** (high inf + high int): Weekly touchpoints, 1:1 meetings, co-creation opportunities\n**Keep Satisfied** (high inf + low int): Executive briefings, milestone updates, risk escalation path\n**Keep Informed** (low inf + high int): Regular newsletters, town halls, feedback channels\n**Monitor** (low inf + low int): Periodic awareness emails, passive updates\n\nFor each stakeholder, suggest: channel, frequency, message framing, and owner. Use **bold** for names.",
    risks:"Identify and analyze stakeholder risks:\n\n1. **Top blockers** — who could stop or delay this initiative and how\n2. **Silent resistors** — who seems neutral but may undermine quietly\n3. **Dependency gaps** — critical roles missing from the map\n4. **Power dynamics** — conflicting interests between high-influence stakeholders\n5. **Mitigation actions** — one concrete action per risk\n\nBe direct and specific. Use **bold** for risk names and key stakeholders.",
  };

  const generateAnalysis=async()=>{
    setAnalysisLoading(true);
    setAnalysis("");
    const currentMode=analysisMode; // capture at call time
    const summary=filtered.map(s=>`- ${s.name} (${s.role}${s.department?", "+s.department:""}): Influence=${s.influence}%, Interest=${s.interest}%, Sentiment=${s.sentiment}, Quadrant=${s.quadrant}${s.notes?", Notes: "+s.notes:""}`).join("\n");
    const prompt=`Stakeholder landscape for analysis:\n${summary}\n\n${ANALYSIS_PROMPTS[currentMode]||ANALYSIS_PROMPTS.strategy}`;
    console.log("[Analysis] Mode:",currentMode,"Stakeholders:",filtered.length);
    const result=await callAI(prompt,"You are an expert stakeholder management consultant. Give practical, specific, actionable advice. Use short paragraphs. **bold** key terms and names.",2000);
    setAnalysis(result);
    setAnalysisLoading(false);
  };

  return(
    <div className="container" style={{padding:"16px 24px 60px"}}>
      {/* Map header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button className="btn btn-g btn-sm" onClick={()=>go("/dashboard")}>← Back</button>
          <span className="badge" style={{background:mt.color+"18",color:mt.color}}>{mt.icon} {mt.label}</span>
          <h2 style={{fontSize:18,fontWeight:700}}>{map.name}</h2>
          {saving&&<span style={{fontSize:11,color:C.dim}}>Saving...</span>}
        </div>
        <button className="btn btn-p btn-sm" onClick={()=>{setEditing(null);setShowForm(true)}}>+ Add</button>
      </div>

      {/* Stat cards */}
      {stakeholders.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
          <div onClick={()=>setFilter(null)} style={{background:!filter?C.surface2:C.card,borderRadius:10,padding:12,border:`1px solid ${!filter?C.accent:C.border}`,textAlign:"center",cursor:"pointer",boxShadow:!filter?`0 0 10px ${C.accentG}`:"none"}}>
            <div style={{fontSize:22,fontWeight:800,color:C.accent}}>{stakeholders.length}</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:"uppercase",marginTop:2}}>See All</div>
          </div>
          {Object.entries(counts).map(([q,c])=>{
            const m=QUAD[q];const active=filter===q;
            return(<div key={q} onClick={()=>setFilter(active?null:q)} style={{background:active?C.surface2:C.card,borderRadius:10,padding:12,border:`1px solid ${active?m.color:C.border}`,textAlign:"center",cursor:"pointer",boxShadow:active?`0 0 10px ${m.glow}`:"none"}}>
              <div style={{fontSize:22,fontWeight:800,color:m.color}}>{c}</div>
              <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:"uppercase",marginTop:2}}>{q}</div>
            </div>);
          })}
        </div>
      )}

      {/* Tabs — BUG 4 FIX: added Export tab */}
      <div style={{display:"flex",gap:2,background:C.surface,borderRadius:10,padding:3,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"map",l:"🗺️ Map"},{id:"analysis",l:"🤖 AI Analysis"},{id:"messages",l:"✉️ Messages"},{id:"import",l:"⚡ Import"},{id:"export",l:"📤 Export"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:tab===t.id?C.surface2:"transparent",color:tab===t.id?C.text:C.muted,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>
        ))}
      </div>

      {/* Stakeholder Form */}
      {showForm&&<StakeholderForm editing={editing} onAdd={addStakeholder} onCancel={()=>{setShowForm(false);setEditing(null)}}/>}

      {/* ── MAP TAB ── */}
      {tab==="map"&&(
        <div style={{display:"grid",gridTemplateColumns:stakeholders.length>0?"1fr 320px":"1fr",gap:16}}>
          <div className="card">
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Influence / Interest Matrix</div>
            <div style={{position:"relative",width:"100%",aspectRatio:"1.4/1",background:C.surface,borderRadius:10,overflow:"hidden"}}>
              <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:C.border}}/>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:1,background:C.border}}/>
              {[{l:"Keep Satisfied",x:"25%",y:"25%"},{l:"Manage Closely",x:"75%",y:"25%"},{l:"Monitor",x:"25%",y:"75%"},{l:"Keep Informed",x:"75%",y:"75%"}].map(q=>(
                <div key={q.l} style={{position:"absolute",left:q.x,top:q.y,transform:"translate(-50%,-50%)",fontSize:11,fontWeight:600,color:QUAD[q.l].color,opacity:.4,textTransform:"uppercase",letterSpacing:".06em",pointerEvents:"none"}}>{q.l}</div>
              ))}
              {stakeholders.map(s=>{
                const x=5+(s.interest/100)*90,y=95-(s.influence/100)*90;
                const isSel=selected===s.id,isDim=filter&&s.quadrant!==filter;
                const col=SENT_COLORS[s.sentiment]||C.accent;
                return(
                  <div key={s.id} onClick={()=>setSelected(s.id)} style={{position:"absolute",left:x+"%",top:y+"%",transform:"translate(-50%,-50%)",cursor:"pointer",zIndex:isSel?10:1,opacity:isDim?.15:1,transition:"opacity .3s"}}>
                    <div style={{width:isSel?18:14,height:isSel?18:14,borderRadius:"50%",background:col,boxShadow:isSel?`0 0 16px ${col}88`:`0 0 6px ${col}44`,border:isSel?"2px solid #fff":"2px solid transparent"}}/>
                    <div style={{position:"absolute",top:-22,left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap",fontSize:10,fontWeight:600,color:isSel?"#fff":C.muted,background:isSel?C.surface2:"rgba(11,15,26,0.75)",padding:"2px 5px",borderRadius:4,pointerEvents:"none"}}>{s.name.split(" ")[0]}</div>
                  </div>
                );
              })}
              {stakeholders.length===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:C.dim,fontSize:13,fontStyle:"italic"}}>Add stakeholders to see them here</div>}
            </div>
            <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
              {Object.entries(SENT_COLORS).map(([k,c])=>(<div key={k} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:c}}/><span style={{fontSize:11,color:C.muted,textTransform:"capitalize"}}>{k}</span></div>))}
            </div>
          </div>
          {stakeholders.length>0&&(
            <div>
              {filter&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:600,color:QUAD[filter].color}}>{QUAD[filter].icon} {filter} ({filtered.length})</span>
                <button className="btn btn-g btn-sm" onClick={()=>setFilter(null)}>✕ Clear</button>
              </div>}
              <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:520,overflowY:"auto"}}>
                {filtered.map(s=>{const m=QUAD[s.quadrant];return(
                  <div key={s.id} onClick={()=>setSelected(s.id)} className="card" style={{padding:14,cursor:"pointer",borderColor:selected===s.id?C.accent:C.border,boxShadow:selected===s.id?`0 0 12px ${C.accentG}`:"none",background:selected===s.id?C.surface2:C.card}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{fontSize:14,fontWeight:700}}>{s.name}</div><div style={{fontSize:12,color:C.muted}}>{s.role}{s.department?" · "+s.department:""}</div></div>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();setEditing(s);setShowForm(true)}}>✏️</button>
                        <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();deleteStakeholder(s.id)}}>🗑️</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                      <span className="badge" style={{background:m.glow,color:m.color}}>{m.icon} {s.quadrant}</span>
                      <span style={{fontSize:12}}>{SENT_EMOJI[s.sentiment]} {s.sentiment}</span>
                    </div>
                    {s.notes&&<div style={{fontSize:12,color:C.dim,marginTop:6,lineHeight:1.4}}>{s.notes}</div>}
                  </div>
                )})}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── AI ANALYSIS TAB — BUG 1 FIX ── */}
      {tab==="analysis"&&(
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🤖 AI Analysis</div>
          {/* Mode selector — active state clearly visible */}
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {[{k:"strategy",l:"🎯 Strategy Brief"},{k:"comms",l:"📣 Comms Plan"},{k:"risks",l:"⚠️ Risk Analysis"}].map(m=>(
              <button key={m.k} onClick={()=>{
                setAnalysisMode(m.k);
                setAnalysis(""); // clear old result when switching mode
              }} style={{
                padding:"8px 14px",
                borderRadius:8,
                border:`2px solid ${analysisMode===m.k?C.accent:C.border}`,
                background:analysisMode===m.k?C.accentG:"transparent",
                color:analysisMode===m.k?C.accent:C.muted,
                fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                transition:"all .15s"
              }}>{m.l}</button>
            ))}
          </div>
          {/* Mode description so user knows what they'll get */}
          <div style={{fontSize:12,color:C.dim,marginBottom:14,padding:"8px 12px",background:C.surface,borderRadius:8}}>
            {analysisMode==="strategy"&&"Engagement priorities, coalition opportunities, and 30-day quick wins."}
            {analysisMode==="comms"&&"Channel, frequency, and message framing per quadrant and stakeholder."}
            {analysisMode==="risks"&&"Blockers, silent resistors, dependency gaps, and mitigation actions."}
          </div>
          <button className="btn btn-p btn-block" disabled={analysisLoading||filtered.length===0} style={{marginBottom:14}} onClick={generateAnalysis}>
            {analysisLoading?"Analyzing...":"Generate "+{strategy:"Strategy Brief",comms:"Comms Plan",risks:"Risk Analysis"}[analysisMode]}
          </button>
          {analysis&&(
            <div id="analysis-output" style={{padding:16,borderRadius:10,background:C.surface,border:`1px solid ${C.border}`,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:500,overflowY:"auto"}}
              dangerouslySetInnerHTML={{__html:analysis.replace(/\*\*(.*?)\*\*/g,'<strong style="color:#4F8BFF">$1</strong>')}}/>
          )}
          {filtered.length===0&&<div style={{fontSize:13,color:C.dim,textAlign:"center",padding:20,fontStyle:"italic"}}>Add stakeholders first</div>}
        </div>
      )}

      {/* ── MESSAGES TAB ── */}
      {tab==="messages"&&(
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>✉️ Draft Messages</div>
          <div style={{marginBottom:14}}><label className="label">Initiative context (optional)</label><input className="inp" value={draftContext} onChange={e=>setDraftContext(e.target.value)} placeholder="e.g., ERP migration, agile rollout..."/></div>
          {filtered.length===0?<div style={{fontSize:13,color:C.dim,textAlign:"center",padding:20}}>Add stakeholders first</div>:
           filtered.map(s=>(
            <div key={s.id} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,background:C.surface,border:`1px solid ${C.border}`}}>
                <div><span style={{fontSize:13,fontWeight:600}}>{s.name}</span><span style={{fontSize:11,color:C.muted,marginLeft:8}}>{CADENCE[s.quadrant]}</span></div>
                <button className="btn btn-p btn-sm" disabled={draftLoading} onClick={async()=>{
                  setDraftTarget(s);setDraftText("");setDraftLoading(true);
                  const prompt=`Write a professional stakeholder communication for:
Name: ${s.name}
Role: ${s.role}${s.department?", "+s.department:""}
Influence: ${s.influence}%, Interest: ${s.interest}%
Sentiment: ${s.sentiment}
Quadrant: ${s.quadrant} (engagement approach: ${QUAD[s.quadrant].strategy})
Notes: ${s.notes||"None"}
${draftContext?"Initiative context: "+draftContext:""}

Write a ${CADENCE[s.quadrant].toLowerCase()} message appropriate for their quadrant and sentiment.
- Under 120 words
- Professional and warm
- No placeholder brackets like [NAME] — use the actual name
- Match tone to sentiment (more reassuring for resistant, more collaborative for champions)`;
                  setDraftText(await callAI(prompt,"You are an expert stakeholder communicator. Write natural, professional messages. Never use placeholder brackets.",1500));
                  setDraftLoading(false);
                }}>{draftLoading&&draftTarget?.id===s.id?"Writing...":"Draft"}</button>
              </div>
              {draftTarget?.id===s.id&&draftText&&(
                <div style={{marginTop:6,padding:14,borderRadius:8,background:C.surface,border:`1px solid ${QUAD[s.quadrant].color}33`,fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {draftText}
                  <div style={{marginTop:10,display:"flex",gap:8}}>
                    <button className="btn btn-s btn-sm" onClick={()=>{navigator.clipboard.writeText(draftText)}}>📋 Copy</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* ── IMPORT TAB — BUG 2 FIX ── */}
      {tab==="import"&&(
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>⚡ Bulk Import</div>
          <p style={{fontSize:12,color:C.muted,marginBottom:12}}>Paste a list in any format — AI parses names, roles, and estimates influence/interest scores automatically.</p>
          <div style={{fontSize:11,color:C.dim,marginBottom:10,padding:"8px 12px",background:C.surface,borderRadius:8,lineHeight:1.6}}>
            <strong style={{color:C.muted}}>Tip:</strong> Include context for better scores. Examples:<br/>
            <span style={{color:C.dim}}>• "Jane Smith — CFO, skeptical about budget impact"</span><br/>
            <span style={{color:C.dim}}>• "Bob Chen — VP Engineering, champion, drives technical decisions"</span><br/>
            <span style={{color:C.dim}}>• "Maria Lopez — Team Lead, influence 60, interest 80, supportive"</span>
          </div>
          <textarea className="inp" value={importText} onChange={e=>setImportText(e.target.value)} placeholder={"Jane Smith — CFO, skeptical about budget impact\nBob Chen — VP Engineering, champion of this initiative\nMaria Lopez — Project Manager, directly impacted, highly interested"} style={{minHeight:140,resize:"vertical"}}/>
          {importStatus&&(
            <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:importStatus.type==="success"?C.greenG:C.warmG,color:importStatus.type==="success"?C.green:C.warm,fontSize:13}}>
              {importStatus.msg}
            </div>
          )}
          <button className="btn btn-p btn-block" style={{marginTop:10}} disabled={!importText.trim()||importLoading} onClick={runImport}>
            {importLoading?"Parsing with AI...":"Import with AI"}
          </button>
        </div>
      )}

      {/* ── EXPORT TAB — BUG 4 FIX ── */}
      {tab==="export"&&(
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>📤 Export</div>
          <p style={{fontSize:12,color:C.muted,marginBottom:20}}>Download your stakeholder map in different formats for reports and presentations.</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* PDF Report */}
            <div style={{padding:16,borderRadius:10,background:C.surface,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>📄 PDF Report</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Opens a print dialog with a formatted stakeholder report. Generate an AI analysis first for best results.</div>
              <button className="btn btn-p btn-sm" onClick={()=>{
                const analysisHTML=document.getElementById("analysis-output")?.innerHTML||"<p><em>No analysis generated yet. Go to AI Analysis tab and generate a report first.</em></p>";
                const rows=stakeholders.map(s=>`<tr><td>${s.name}</td><td>${s.role||""}</td><td>${s.department||""}</td><td>${s.quadrant}</td><td>${s.influence}%</td><td>${s.interest}%</td><td>${s.sentiment}</td><td>${s.notes||""}</td></tr>`).join("");
                const win=window.open("","_blank");
                win.document.write(`<!DOCTYPE html><html><head><title>${map.name} — Stakeholder Report</title>
<style>
  body{font-family:system-ui,sans-serif;padding:48px;max-width:900px;margin:0 auto;color:#1a1a2e}
  h1{font-size:28px;margin-bottom:4px}
  .sub{color:#666;font-size:14px;margin-bottom:32px}
  h2{font-size:18px;margin:32px 0 12px;padding-bottom:6px;border-bottom:2px solid #eee}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;background:#f5f5f5;font-weight:600}
  td{padding:8px 10px;border-bottom:1px solid #eee}
  .analysis{font-size:14px;line-height:1.7;white-space:pre-wrap}
  @media print{body{padding:20px}}
</style></head><body>
<h1>${map.name}</h1>
<div class="sub">Stakeholder Map · ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</div>
<h2>Stakeholder List (${stakeholders.length})</h2>
<table><thead><tr><th>Name</th><th>Role</th><th>Dept</th><th>Quadrant</th><th>Influence</th><th>Interest</th><th>Sentiment</th><th>Notes</th></tr></thead>
<tbody>${rows}</tbody></table>
${analysis?`<h2>AI Analysis</h2><div class="analysis">${analysisHTML}</div>`:""}
</body></html>`);
                win.document.close();
                setTimeout(()=>win.print(),500);
              }}>📄 Print / Save as PDF</button>
            </div>

            {/* CSV */}
            <div style={{padding:16,borderRadius:10,background:C.surface,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>📊 CSV Spreadsheet</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Download all stakeholder data as a CSV file. Open in Excel, Google Sheets, or any spreadsheet tool.</div>
              <button className="btn btn-p btn-sm" onClick={()=>{
                const headers=["Name","Role","Department","Quadrant","Influence","Interest","Sentiment","Notes"];
                const rows=stakeholders.map(s=>[s.name,s.role||"",s.department||"",s.quadrant,s.influence,s.interest,s.sentiment,s.notes||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
                const csv=[headers.join(","),...rows].join("\n");
                const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url;a.download=`${map.name.replace(/[^a-z0-9]/gi,"_")}_stakeholders.csv`;
                document.body.appendChild(a);a.click();
                document.body.removeChild(a);URL.revokeObjectURL(url);
              }}>📊 Download CSV</button>
            </div>

            {/* SVG Matrix */}
            <div style={{padding:16,borderRadius:10,background:C.surface,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>🖼️ SVG Matrix</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Download the influence/interest matrix as an SVG file. Import into Figma, Miro, or PowerPoint.</div>
              <button className="btn btn-p btn-sm" onClick={()=>{
                const W=700,H=500,PAD=60;
                const dotColor={champion:"#34D399",supportive:"#6DD4A0",neutral:"#FBBF24",resistant:"#FF9B6A",blocker:"#FF6B4A"};
                const dots=stakeholders.map(s=>{
                  const x=PAD+(s.interest/100)*(W-PAD*2);
                  const y=(H-PAD)-(s.influence/100)*(H-PAD*2);
                  const col=dotColor[s.sentiment]||"#4F8BFF";
                  return`<circle cx="${x}" cy="${y}" r="9" fill="${col}" opacity="0.9"/>
<text x="${x}" y="${y-14}" text-anchor="middle" font-size="11" fill="#E8ECF4" font-family="system-ui">${s.name.split(" ")[0]}</text>`;
                }).join("\n");
                const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <rect width="${W}" height="${H}" fill="#131825"/>
  <line x1="${W/2}" y1="${PAD}" x2="${W/2}" y2="${H-PAD}" stroke="#232B42" stroke-width="1"/>
  <line x1="${PAD}" y1="${H/2}" x2="${W-PAD}" y2="${H/2}" stroke="#232B42" stroke-width="1"/>
  <text x="${W*0.25}" y="${PAD-10}" text-anchor="middle" font-size="11" fill="#A78BFA" font-family="system-ui" opacity="0.7">KEEP SATISFIED</text>
  <text x="${W*0.75}" y="${PAD-10}" text-anchor="middle" font-size="11" fill="#FF6B4A" font-family="system-ui" opacity="0.7">MANAGE CLOSELY</text>
  <text x="${W*0.25}" y="${H-PAD+20}" text-anchor="middle" font-size="11" fill="#8892A8" font-family="system-ui" opacity="0.7">MONITOR</text>
  <text x="${W*0.75}" y="${H-PAD+20}" text-anchor="middle" font-size="11" fill="#4F8BFF" font-family="system-ui" opacity="0.7">KEEP INFORMED</text>
  <text x="${PAD-10}" y="${H/2}" text-anchor="middle" font-size="11" fill="#8892A8" font-family="system-ui" transform="rotate(-90,${PAD-10},${H/2})">INFLUENCE →</text>
  <text x="${W/2}" y="${H-10}" text-anchor="middle" font-size="11" fill="#8892A8" font-family="system-ui">INTEREST →</text>
  ${dots}
</svg>`;
                const blob=new Blob([svg],{type:"image/svg+xml"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url;a.download=`${map.name.replace(/[^a-z0-9]/gi,"_")}_matrix.svg`;
                document.body.appendChild(a);a.click();
                document.body.removeChild(a);URL.revokeObjectURL(url);
              }}>🖼️ Download SVG</button>
            </div>

          </div>
          {stakeholders.length===0&&<div style={{fontSize:13,color:C.dim,textAlign:"center",padding:20,fontStyle:"italic",marginTop:16}}>Add stakeholders first to enable export.</div>}
        </div>
      )}

      {/* Empty state */}
      {stakeholders.length===0&&!showForm&&tab==="map"&&(
        <div style={{textAlign:"center",padding:"48px 20px",marginTop:16}} className="card">
          <div style={{fontSize:40,marginBottom:12}}>🗺️</div>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Map your stakeholders</h3>
          <p style={{fontSize:14,color:C.muted,marginBottom:20,maxWidth:400,margin:"0 auto 20px"}}>Add stakeholders one by one, or use the Import tab to paste a list.</p>
          <button className="btn btn-p" onClick={()=>setShowForm(true)}>+ Add Your First Stakeholder</button>
        </div>
      )}
    </div>
  );
}

// ── Stakeholder Form ──
function StakeholderForm({editing:ed,onAdd,onCancel}){
  const[name,setName]=useState(ed?.name||"");
  const[role,setRole]=useState(ed?.role||"");
  const[dept,setDept]=useState(ed?.department||"");
  const[inf,setInf]=useState(ed?.influence??50);
  const[int,setInt]=useState(ed?.interest??50);
  const[sent,setSent]=useState(ed?.sentiment||"neutral");
  const[notes,setNotes]=useState(ed?.notes||"");
  const q=classify(inf,int);const m=QUAD[q];

  return(
    <div className="card" style={{marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{ed?"Edit Stakeholder":"Add Stakeholder"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><label className="label">Name</label><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Jane Smith"/></div>
        <div><label className="label">Role</label><input className="inp" value={role} onChange={e=>setRole(e.target.value)} placeholder="VP Engineering"/></div>
      </div>
      <div style={{marginBottom:12}}><label className="label">Department</label><input className="inp" value={dept} onChange={e=>setDept(e.target.value)} placeholder="Engineering"/></div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><label className="label">Influence / Power</label><span style={{fontSize:13,fontWeight:700,color:C.accent}}>{inf}%</span></div>
        <input type="range" min="0" max="100" value={inf} onChange={e=>setInf(+e.target.value)} style={{width:"100%",accentColor:C.accent}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim}}><span>Low</span><span>High</span></div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><label className="label">Interest / Impact</label><span style={{fontSize:13,fontWeight:700,color:C.accent}}>{int}%</span></div>
        <input type="range" min="0" max="100" value={int} onChange={e=>setInt(+e.target.value)} style={{width:"100%",accentColor:C.accent}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim}}><span>Low</span><span>High</span></div>
      </div>
      <div style={{marginBottom:12}}>
        <label className="label">Sentiment</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
          {["champion","supportive","neutral","resistant","blocker"].map(s=>(
            <button key={s} onClick={()=>setSent(s)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${sent===s?C.accent:C.border}`,background:sent===s?C.accentG:"transparent",color:sent===s?C.accent:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:12}}><label className="label">Notes</label><textarea className="inp" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Key concerns, motivations..." style={{minHeight:60,resize:"vertical"}}/></div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:m.glow,marginBottom:12}}>
        <span>{m.icon}</span><span style={{fontSize:13,fontWeight:600,color:m.color}}>{q}</span><span style={{fontSize:12,color:C.muted}}>— {m.strategy}</span>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="btn btn-s" onClick={onCancel}>Cancel</button>
        <button className="btn btn-p" disabled={!name.trim()} onClick={()=>onAdd({name:name.trim(),role:role.trim(),department:dept.trim(),influence:inf,interest:int,sentiment:sent,notes,quadrant:q})}>
          {ed?"Save Changes":"Add Stakeholder"}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════
function App(){
  const route=useRouter();
  const{user,loading}=useAuth();

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.dim}}>Loading...</div>;

  const needsAuth=route.startsWith("/dashboard")||route.startsWith("/map/");
  if(needsAuth&&!user){go("/login");return null;}

  const mapMatch=route.match(/^\/map\/(.+)$/);

  return(
    <div style={{minHeight:"100vh"}}>
      <Nav user={user}/>
      {route==="/"&&<HomePage/>}
      {route==="/features"&&<FeaturesPage/>}
      {route==="/pricing"&&<PricingPage/>}
      {route==="/login"&&<AuthPage mode="login"/>}
      {route==="/signup"&&<AuthPage mode="signup"/>}
      {route==="/dashboard"&&user&&<Dashboard user={user}/>}
      {mapMatch&&user&&<MapEditor mapId={mapMatch[1]} user={user}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
