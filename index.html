async function callAI(prompt,system,tokens=2000){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return"Please log in to use AI features.";
    const res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},body:JSON.stringify({max_tokens:tokens,system:system||"",messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    if(!res.ok)return"AI error: "+(data.detail||data.error||res.status);
    return data.content?.map(b=>b.text||"").join("\n")||"";
  }catch(e){return"AI unavailable: "+e.message;}
}

function useRouter(){
  const[route,setRoute]=useState(window.location.hash.slice(1)||"/");
  useEffect(()=>{const h=()=>setRoute(window.location.hash.slice(1)||"/");window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  return route;
}

function useAuth(){
  const[user,setUser]=useState(null);

    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);
  return{user,loading};
}

          <div className="mono" style={{fontSize:10,color:C.muted,letterSpacing:".08em",marginBottom:14}}>NEW MAP</div>
          <div style={{marginBottom:12}}><label className="label">Map name</label><input className="inp" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. ERP Migration Stakeholders" onKeyDown={e=>e.key==="Enter"&&createMap()}/></div>
          <div style={{marginBottom:16}}>
            <label className="label">Map type</label>

                <button key={k} onClick={()=>setNewType(k)} style={{flex:1,padding:"10px 8px",border:"none",borderRight:i<2?`1px solid ${C.hairline}`:"none",background:newType===k?C.ink:C.bg,color:newType===k?C.bg:C.ink2,cursor:"pointer",fontFamily:"'Inter Tight',sans-serif",fontSize:12,fontWeight:500}}>
                  <div className="mono" style={{fontSize:9,marginBottom:2,opacity:.7}}>{v.code}</div>{v.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowCreate(false)}>Cancel</button>

          </div>
        </div>
      )}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.hairline}`,marginBottom:20}}>
        {[{id:"all",l:"All"},{id:"product",l:"Product"},{id:"project",l:"Project"},{id:"portfolio",l:"Portfolio"}].map(t=>(
          <button key={t.id} onClick={()=>setFilter(t.id)} style={{padding:"8px 16px",border:"none",background:"transparent",borderBottom:filter===t.id?`2px solid ${C.ink}`:"2px solid transparent",color:filter===t.id?C.ink:C.muted,fontSize:12,fontWeight:filter===t.id?600:400,cursor:"pointer",fontFamily:"'Inter Tight',sans-serif",marginBottom:-1}}>
            {t.l} <span className="mono" style={{fontSize:10,marginLeft:4}}>({counts[t.id]||0})</span>
          </button>
        ))}
      </div>
      {loading?(<div className="mono" style={{fontSize:12,color:C.muted,padding:"40px 0"}}>Loading...</div>)
      :filtered.length===0?(
        <div className="card" style={{textAlign:"center",padding:48}}>
          <div className="mono" style={{fontSize:10,color:C.muted,marginBottom:12}}>NO MAPS</div>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:6}}>{maps.length===0?"No maps yet":"No maps in this category"}</h3>
          <p style={{color:C.ink2,fontSize:13,marginBottom:24}}>Create your first stakeholder map to get started.</p>
          {maps.length===0&&<button className="btn btn-fill" onClick={()=>setShowCreate(true)}>+ Create first map</button>}
        </div>
      ):(
        <div style={{border:`1px solid ${C.hairline}`}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 80px 80px 120px 80px",padding:"8px 16px",background:C.surface,borderBottom:`1px solid ${C.hairline}`}}>
            {["Map name","Type","Stakeholders","Updated",""].map(h=><div key={h} className="label" style={{margin:0}}>{h}</div>)}
          </div>
          {filtered.map((m,i)=>{
            const mt=MAP_TYPES[m.type]||MAP_TYPES.project;
            const sh=m.stakeholders||[];
            const qCounts=emptyQuadCounts();
            sh.forEach(s=>{const q=s.quadrant||classify(s.influence||50,s.interest||50);qCounts[q]=(qCounts[q]||0)+1;});
            return(
              <div key={m.id} onClick={()=>go("/map/"+m.id)} style={{display:"grid",gridTemplateColumns:"2fr 80px 80px 120px 80px",padding:"12px 16px",borderBottom:i<filtered.length-1?`1px solid ${C.hairline}`:"none",alignItems:"center",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{m.name}</div>
                  <div style={{display:"flex",gap:8,marginTop:4}}>
                    {Object.entries(qCounts).filter(([,c])=>c>0).map(([q,c])=>(
                      <span key={q} className="mono" style={{fontSize:9,color:QUAD[q].color}}>{c} {q.split(" ")[0]}</span>
                    ))}
                  </div>
                </div>
                <div><span className="badge" style={{borderColor:C.hairline,color:C.muted}}>{mt.code}</span></div>
                <div className="mono" style={{fontSize:12}}>{sh.length}</div>
                <div className="mono" style={{fontSize:11,color:C.muted}}>{new Date(m.updated_at).toLocaleDateString("en-GB")}</div>
                <div style={{textAlign:"right"}}><button className="btn btn-ghost btn-xs" onClick={e=>{e.stopPropagation();deleteMap(m.id)}}>Delete</button></div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MapEditor({mapId,user}){
  const[map,setMap]=useState(null);const[stakeholders,setStakeholders]=useState([]);const[loading,setLoading]=useState(true);const[saving,setSaving]=useState(false);
  const[tab,setTab]=useState("map");const[selected,setSelected]=useState(null);const[filter,setFilter]=useState(null);const[showForm,setShowForm]=useState(false);const[editing,setEditing]=useState(null);
  const[analysisMode,setAnalysisMode]=useState("strategy");const[analysis,setAnalysis]=useState("");const[analysisLoading,setAnalysisLoading]=useState(false);
  const[draftTarget,setDraftTarget]=useState(null);const[draftText,setDraftText]=useState("");const[draftLoading,setDraftLoading]=useState(false);const[draftContext,setDraftContext]=useState("");
  const[importText,setImportText]=useState("");const[importLoading,setImportLoading]=useState(false);const[importStatus,setImportStatus]=useState(null);
  // Touchpoints
  const[touchpoints,setTouchpoints]=useState([]);const[tpLoading,setTpLoading]=useState(false);const[tpTarget,setTpTarget]=useState(null);const[tpForm,setTpForm]=useState({type:"meeting",notes:"",sentiment_after:"neutral"});const[tpSaving,setTpSaving]=useState(false);
  const saveTimer=useRef(null);
  const[initiatives,setInitiatives]=useState([]);
  const[mapName,setMapName]=useState("");
  const[mapDescription,setMapDescription]=useState("");
  const[nudges,setNudges]=useState([]);
  const[nudgeThresholds,setNudgeThresholds]=useState({manage_closely:7,keep_satisfied:14,keep_informed:30,monitor:60});
  const[showThresholds,setShowThresholds]=useState(false);
  const[linkedInitiativeId,setLinkedInitiativeId]=useState(null);
  const[expandedStakeholderId,setExpandedStakeholderId]=useState(null);
  const[arcTexts,setArcTexts]=useState({});
  const[arcLoadingId,setArcLoadingId]=useState(null);

  useEffect(()=>{loadMap();loadTouchpoints();loadInitiatives();},[mapId]);
  useEffect(()=>{
    if(!loading&&stakeholders.length>0)generateNudges(stakeholders,touchpoints,nudgeThresholds);
  },[loading,stakeholders,touchpoints,nudgeThresholds]);
  const loadMap=async()=>{setLoading(true);const{data,error}=await sb.from("maps").select("*").eq("id",mapId).single();if(!error&&data){setMap(data);setStakeholders(data.stakeholders||[]);setLinkedInitiativeId(data.initiative_id||null);setMapName(data.name||"");setMapDescription(data.description||"");setNudgeThresholds(data.nudge_thresholds||{manage_closely:7,keep_satisfied:14,keep_informed:30,monitor:60});}else go("/dashboard");setLoading(false);};
  const loadInitiatives=async()=>{const{data}=await sb.from("initiatives").select("id,name,status").eq("user_id",user.id).order("name",{ascending:true});if(data)setInitiatives(data);};
  const saveMapMeta=async(field,value)=>{setSaving(true);await sb.from("maps").update({[field]:value,updated_at:new Date().toISOString()}).eq("id",mapId);setSaving(false);};

  const saveThresholds=async(updated)=>{setNudgeThresholds(updated);await sb.from("maps").update({nudge_thresholds:updated,updated_at:new Date().toISOString()}).eq("id",mapId);};

  const generateNudges=useCallback((currentStakeholders,currentTouchpoints,thresholds)=>{
    const QUAD_KEY={"Manage Closely":"manage_closely","Keep Satisfied":"keep_satisfied","Keep Informed":"keep_informed","Monitor":"monitor"};
    const now=Date.now();
    const result=[];
    for(const s of currentStakeholders){
      const key=QUAD_KEY[s.quadrant];
      if(!key)continue;
      const threshold=thresholds[key];
      const stps=currentTouchpoints.filter(t=>t.stakeholder_id===s.id);
      const last=stps[0];
      const daysSince=last?Math.floor((now-new Date(last.logged_at))/(24*60*60*1000)):null;
      const isOverdue=daysSince===null||daysSince>threshold;
      if(!isOverdue)continue;
      const msg=daysSince===null?`${s.name} has never been contacted. Cadence: every ${threshold} days.`:`${s.name} — no contact in ${daysSince} days. Cadence: every ${threshold} days.`;
      result.push({id:s.id,message:msg,stakeholder:s});
    }
    setNudges(result);
  },[]);

  const dismissNudge=(nudgeId)=>{setNudges(prev=>prev.filter(n=>n.id!==nudgeId));};
  const linkInitiative=async(initiativeId)=>{
  // Freemium gate: 1 map per initiative on free tier
  if(initiativeId){
    const{data:existing}=await sb.from("maps").select("id").eq("initiative_id",initiativeId).neq("id",mapId);
    if(existing&&existing.length>0){alert("Free plan: only 1 map per initiative. Upgrade to link multiple maps.");return;}
  }
  setLinkedInitiativeId(initiativeId||null);
  await sb.from("maps").update({initiative_id:initiativeId||null,updated_at:new Date().toISOString()}).eq("id",mapId);
};
  const loadTouchpoints=async()=>{const{data}=await sb.from("touchpoints").select("*").eq("map_id",mapId).order("logged_at",{ascending:false});if(data)setTouchpoints(data);};
  const logTouchpoint=async()=>{
    if(!tpTarget)return;
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return;
    setTpSaving(true);
    await sb.from("touchpoints").insert({user_id:session.user.id,map_id:mapId,stakeholder_id:tpTarget.id,stakeholder_name:tpTarget.name,type:tpForm.type,notes:tpForm.notes,sentiment_after:tpForm.sentiment_after,logged_at:new Date().toISOString()});
    // Optionally update stakeholder sentiment in the map
    if(tpForm.sentiment_after!==tpTarget.sentiment){
      const updated=stakeholders.map(s=>s.id===tpTarget.id?{...s,sentiment:tpForm.sentiment_after}:s);
      saveStakeholders(updated);
    }
    setTpTarget(null);setTpForm({type:"meeting",notes:"",sentiment_after:"neutral"});
    await loadTouchpoints();
    setTpSaving(false);
  };
  const saveStakeholders=useCallback((newList)=>{setStakeholders(newList);if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(async()=>{setSaving(true);await sb.from("maps").update({stakeholders:newList,updated_at:new Date().toISOString()}).eq("id",mapId);setSaving(false);},1000);},[mapId]);
  const addStakeholder=(s)=>{if(editing){saveStakeholders(stakeholders.map(p=>p.id===editing.id?{...s,id:editing.id}:p));setEditing(null);}else{saveStakeholders([...stakeholders,{...s,id:Date.now().toString()}]);}setShowForm(false);};
  const deleteStakeholder=(id)=>{saveStakeholders(stakeholders.filter(p=>p.id!==id));if(selected===id)setSelected(null);};
  const importStakeholders=(list)=>{const newOnes=list.map((s,i)=>({...s,id:(Date.now()+i).toString(),quadrant:classify(s.influence??50,s.interest??50)}));saveStakeholders([...stakeholders,...newOnes]);};

  const runImport=async()=>{
    setImportLoading(true);setImportStatus(null);
    const aiPrompt=`Extract stakeholders. Return ONLY a raw JSON array.
Each object: "name","role","department","influence"(0-100),"interest"(0-100),"sentiment"(champion/supportive/neutral/resistant/blocker),"notes".
Rules: CEO/Board→inf 85-95, CFO/VP/Director→inf 70-85, Manager→inf 40-55, "doesn't care"→int 15-30, "key stakeholder/champion"→int 75-90, "skeptical/worried"→sentiment resistant, "blocking/against"→sentiment blocker.
Text:\n${importText}`;
    const result=await callAI(aiPrompt,"JSON data extractor. Return ONLY valid JSON array.",4096);
    let parsed=null;
    if(!result.startsWith("AI")){try{const c=result.replace(/```json|```/g,"").trim();const cand=JSON.parse(c);if(Array.isArray(cand)&&cand.length>0)parsed=cand;}catch(e){console.warn("[Import] Parse failed:",e.message);}}
    if(parsed){
      const v=parsed.map((s,i)=>({name:String(s.name||"Stakeholder "+(i+1)).trim(),role:String(s.role||"").trim(),department:String(s.department||"").trim(),influence:Math.min(100,Math.max(0,Math.round(Number(s.influence)||50))),interest:Math.min(100,Math.max(0,Math.round(Number(s.interest)||50))),sentiment:SENTIMENTS.includes(s.sentiment)?s.sentiment:"neutral",notes:String(s.notes||"").trim()}));
      importStakeholders(v);setImportText("");setImportStatus({type:"success",msg:`${v.length} stakeholder${v.length!==1?"s":""} imported via AI.`});
    }else{
      const lines=importText.split("\n").map(l=>l.replace(/^\d+[\.)]\s*/,"").trim()).filter(l=>l.length>2);
      const fallback=lines.map((line,i)=>{
        const lower=line.toLowerCase();const parts=line.split(/\s*[—–\-]\s*/);const name=(parts[0]||"").trim()||"Stakeholder "+(i+1);const roleRaw=(parts[1]||"").split(",")[0].trim();
        const infNum=lower.match(/inf(?:luence)?[:\s=]+(\d+)/);const intNum=lower.match(/int(?:erest)?[:\s=]+(\d+)/);
        let inf=infNum?parseInt(infNum[1]):null,int=intNum?parseInt(intNum[1]):null;
        if(inf===null){if(/\b(ceo|cfo|cto|coo|board|executive sponsor)\b/.test(lower))inf=88;else if(/\b(vp|vice president|director|svp)\b/.test(lower))inf=75;else if(/\bmanager\b/.test(lower))inf=50;else if(/\b(high influence|influential)\b/.test(lower))inf=72;else if(/\b(low influence|peripheral)\b/.test(lower))inf=22;else inf=50;}
        if(int===null){if(/\b(champion|sponsor|key stakeholder|directly impacted)\b/.test(lower))int=85;else if(/\b(high interest|invested|engaged)\b/.test(lower))int=70;else if(/\b(doesn't care|low interest|peripheral)\b/.test(lower))int=20;else int=50;}
        let sent="neutral";if(/\b(champion|loves it|pushing for)\b/.test(lower))sent="champion";else if(/\b(supportive|supports|backing)\b/.test(lower))sent="supportive";else if(/\b(blocking|against|refuses)\b/.test(lower))sent="blocker";else if(/\b(resistant|skeptical|concerned|worried)\b/.test(lower))sent="resistant";
        return{name,role:roleRaw,department:"",influence:Math.min(100,Math.max(0,inf)),interest:Math.min(100,Math.max(0,int)),sentiment:sent,notes:parts.slice(1).join(" — ").trim()};
      });
      if(fallback.length>0){importStakeholders(fallback);setImportText("");setImportStatus({type:"warning",msg:`AI unavailable — text parser used. ${fallback.length} imported. Scores may need adjustment.`});}
      else setImportStatus({type:"error",msg:"Could not parse. Try: Name — Role, description (one per line)"});
    }
    setImportLoading(false);
  };

  const ANALYSIS_PROMPTS={
    strategy:"Analyze this stakeholder landscape:\n1. Top 3 engagement priorities\n2. Key risks from resistant stakeholders\n3. Coalition opportunities\n4. 3 concrete quick wins for next 30 days\nUse **bold** for key names.",
    comms:"Create a communication plan by quadrant:\n**Manage Closely** — weekly touchpoints, 1:1s\n**Keep Satisfied** — executive briefings, milestone updates\n**Keep Informed** — newsletters, town halls\n**Monitor** — periodic awareness\nFor each stakeholder: channel, frequency, message framing.",
    risks:"Identify stakeholder risks:\n1. **Blockers** — who could stop this\n2. **Silent resistors**\n3. **Dependency gaps**\n4. **Power dynamics**\n5. **Mitigations** — one action per risk\nUse **bold** for key names.",
    mapArc:"Below is each stakeholder's relationship arc — the chronological log of touchpoints with sentiment shift. Write a 6-8 sentence portfolio-level reflection:\n- Which relationships are strong and well-tended (name them)\n- Which have recovered from resistance, and what turned them\n- Which are cooling or drifting, with why\n- Where blindspots sit (stakeholders with sparse or no history)\nReference specific dates or notes. Use **bold** for stakeholder names. Write as reflection, not a plan.",
  };

  // Relationship arc thresholds
  const ARC_MIN_TP=10, ARC_MIN_NOTES_PCT=0.7;
  const MAP_ARC_MIN_COVERAGE=0.6, MAP_ARC_MIN_TP_PER=3, MAP_ARC_MIN_SPAN_DAYS=30;

  const stakeholderTps=(id)=>touchpoints.filter(t=>t.stakeholder_id===id).slice().sort((a,b)=>new Date(a.logged_at)-new Date(b.logged_at));

  const arcStatus=(id)=>{
    const tps=stakeholderTps(id);
    const withNotes=tps.filter(t=>t.notes&&t.notes.trim().length>0).length;
    const pct=tps.length?withNotes/tps.length:0;
    return{tps,count:tps.length,withNotes,pct,unlocked:tps.length>=ARC_MIN_TP&&pct>=ARC_MIN_NOTES_PCT};
  };

  const mapArcStatus=()=>{
    if(stakeholders.length===0||touchpoints.length===0)return{unlocked:false,coverage:0,spanDays:0,met:0,total:stakeholders.length};
    const met=stakeholders.filter(s=>touchpoints.filter(t=>t.stakeholder_id===s.id).length>=MAP_ARC_MIN_TP_PER).length;
    const coverage=met/stakeholders.length;
    const dates=touchpoints.map(t=>new Date(t.logged_at).getTime());
    const spanDays=Math.floor((Math.max(...dates)-Math.min(...dates))/(24*60*60*1000));
    return{unlocked:coverage>=MAP_ARC_MIN_COVERAGE&&spanDays>=MAP_ARC_MIN_SPAN_DAYS,coverage,spanDays,met,total:stakeholders.length};
  };

  const mapTpDateRange=()=>{
    if(touchpoints.length===0){const now=Date.now();return{start:now-30*24*60*60*1000,end:now};}
    const dates=touchpoints.map(t=>new Date(t.logged_at).getTime());
    const min=Math.min(...dates), max=Math.max(...dates);
    return{start:min===max?min-7*24*60*60*1000:min,end:max};
  };

  const generateStakeholderArc=async(sid)=>{
    setArcLoadingId(sid);
    const s=stakeholders.find(x=>x.id===sid);
    const tps=stakeholderTps(sid);
    const timeline=tps.map(t=>`  ${new Date(t.logged_at).toLocaleDateString("en-GB")} · ${t.type} · sentiment_after: ${t.sentiment_after}${t.notes?"\n    notes: "+t.notes:""}`).join("\n");
    const prompt=`Stakeholder: ${s.name} (${s.role}${s.department?", "+s.department:""}, ${s.quadrant})\nCurrent sentiment: ${s.sentiment}\nTouchpoint timeline (${tps.length} entries, oldest → newest):\n${timeline}\n\nWrite a 3-5 sentence "relationship arc": how it started, what shifted (with dates), where it stands now. Reference specific notes. Be concrete. Use **bold** for turning points.`;
    const result=await callAI(prompt,"Expert stakeholder relationship analyst. Concrete, temporal, specific. No generic advice.",1200);
    setArcTexts(prev=>({...prev,[sid]:result}));
    setArcLoadingId(null);
  };

  const generateAnalysis=async()=>{
    setAnalysisLoading(true);setAnalysis("");
    const mode=analysisMode;
    let payload;
    if(mode==="mapArc"){
      payload=stakeholders.map(s=>{
        const tps=stakeholderTps(s.id);
        const arc=tps.slice(-8).map(t=>`  ${new Date(t.logged_at).toLocaleDateString("en-GB")} ${t.type} → ${t.sentiment_after}${t.notes?" ("+t.notes.slice(0,120)+")":""}`).join("\n");
        return`- ${s.name} (${s.role}, ${s.quadrant}, sentiment: ${s.sentiment}, ${tps.length} touchpoints)\n${arc||"  no touchpoints logged"}`;
      }).join("\n\n");
    }else{
      payload=filtered.map(s=>`- ${s.name} (${s.role}${s.department?", "+s.department:""}): Influence=${s.influence}%, Interest=${s.interest}%, Sentiment=${s.sentiment}, Quadrant=${s.quadrant}${s.notes?", Notes: "+s.notes:""}`).join("\n");
    }
    const result=await callAI(`Stakeholders:\n${payload}\n\n${ANALYSIS_PROMPTS[mode]}`,"Expert stakeholder management consultant. Practical, specific, actionable. Short paragraphs.",mode==="mapArc"?2500:2000);
    setAnalysis(result);setAnalysisLoading(false);
  };

  if(loading)return<div style={{textAlign:"center",padding:80,color:C.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Loading...</div>;
  if(!map)return<div style={{textAlign:"center",padding:80}}>Map not found.</div>;

  const filtered=filter?stakeholders.filter(s=>s.quadrant===filter):stakeholders;
  const mt=MAP_TYPES[map.type]||MAP_TYPES.project;
  const counts=emptyQuadCounts();
  stakeholders.forEach(s=>counts[s.quadrant]=(counts[s.quadrant]||0)+1);

  return(
    <div className="container" style={{padding:"16px 24px 60px"}}>
      {/* Nudge strip — collapsed summary */}
      {nudges.length>0&&(
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:C.amberG,border:`1px solid ${C.amber}`,cursor:"pointer"}} onClick={()=>setExpandedStakeholderId(expandedStakeholderId==="__nudges__"?null:"__nudges__")}>
            <span style={{color:C.amber,fontSize:14,flexShrink:0}}>!</span>
            <span className="mono" style={{fontSize:11,color:C.ink,flex:1}}>{nudges.length} stakeholder{nudges.length!==1?"s need":" needs"} contact</span>
            <span className="mono" style={{fontSize:10,color:C.amber}}>{expandedStakeholderId==="__nudges__"?"Collapse":"Expand"}</span>
          </div>
          {expandedStakeholderId==="__nudges__"&&nudges.map(n=>(
            <div key={n.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 14px 8px 38px",background:C.bg,borderLeft:`1px solid ${C.amber}`,borderRight:`1px solid ${C.amber}`,borderBottom:`1px solid ${C.hairline}`}}>
              <span className="mono" style={{fontSize:11,color:C.ink,flex:1}}>{n.message}</span>
              <button className="btn btn-ghost btn-xs" style={{borderColor:C.amber,color:C.amber,flexShrink:0}} onClick={()=>{setTpTarget(n.stakeholder);setTpForm({type:"meeting",notes:"",sentiment_after:n.stakeholder.sentiment||"neutral"});}}>Log touchpoint</button>
              <button className="btn btn-ghost btn-xs" style={{flexShrink:0}} onClick={()=>dismissNudge(n.id)}>Dismiss</button>
            </div>
          ))}
        </div>
      )}

      {/* Threshold settings */}
      {showThresholds&&(
        <div className="card" style={{marginBottom:12,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div className="mono" style={{fontSize:10,color:C.muted,letterSpacing:".08em"}}>NUDGE THRESHOLDS</div>
            <button className="btn btn-ghost btn-xs" onClick={()=>setShowThresholds(false)}>Close</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {[{key:"manage_closely",label:"Manage Closely"},{key:"keep_satisfied",label:"Keep Satisfied"},{key:"keep_informed",label:"Keep Informed"},{key:"monitor",label:"Monitor"}].map(({key,label})=>(
              <div key={key}>
                <label className="label" style={{color:QUAD[label]?.color||C.muted}}>{label}</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="number" min="1" max="365" className="inp" value={nudgeThresholds[key]} onChange={e=>{const updated={...nudgeThresholds,[key]:parseInt(e.target.value)||1};saveThresholds(updated);}} style={{width:64,textAlign:"center"}}/>

                  const dots=stakeholders.map(s=>{const x=PAD+(s.interest/100)*(W-PAD*2),y=(H-PAD)-(s.influence/100)*(H-PAD*2),col=SENT_COLORS[s.sentiment]||C.ink;return`<circle cx="${x}" cy="${y}" r="8" fill="${col}" opacity="0.9"/><text x="${x}" y="${y-12}" text-anchor="middle" font-size="10" fill="${C.ink}" font-family="'JetBrains Mono',monospace">${s.name.split(" ")[0]}</text>`;}).join("\n");

                  const blob=new Blob([svg],{type:"image/svg+xml"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${map.name.replace(/[^a-z0-9]/gi,"_")}_matrix.svg`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

                <button className="btn btn-fill btn-sm" onClick={logTouchpoint} disabled={tpSaving}>
                  {tpSaving?"Saving...":"Log touchpoint"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TpSparkline({tps,dateStart,dateEnd,height=24,dotSize=5,showAxisLabels=false}){
  if(!tps||tps.length===0)return<div className="mono" style={{fontSize:9,color:C.muted,fontStyle:"italic",lineHeight:height+"px"}}>no history yet</div>;
  const span=Math.max(1,dateEnd-dateStart);
  const dots=tps.map((t,i)=>{
    const x=((new Date(t.logged_at).getTime()-dateStart)/span)*100;
    return{x:Math.min(100,Math.max(0,x)),color:SENT_COLORS[t.sentiment_after]||C.ink,tp:t,i};
  });
  return(
    <div style={{position:"relative",width:"100%",height,paddingBottom:showAxisLabels?14:0}}>
      <div style={{position:"relative",width:"100%",height}}>
        <div style={{position:"absolute",left:0,right:0,top:"50%",height:1,background:C.hairline}}/>
        {dots.map(d=>(
          <div key={d.i} title={`${new Date(d.tp.logged_at).toLocaleDateString("en-GB")} · ${d.tp.type} · ${d.tp.sentiment_after}${d.tp.notes?" — "+d.tp.notes.slice(0,80):""}`}
            style={{position:"absolute",left:`calc(${d.x}% - ${dotSize/2}px)`,top:`calc(50% - ${dotSize/2}px)`,width:dotSize,height:dotSize,borderRadius:"50%",background:d.color,border:`1px solid ${C.bg}`,cursor:"pointer",transition:"transform .12s"}}
            onMouseEnter={e=>e.currentTarget.style.transform="scale(1.6)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}/>
        ))}
      </div>
      {showAxisLabels&&(
        <div className="mono" style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,letterSpacing:".04em",marginTop:4}}>
          <span>{new Date(dateStart).toLocaleDateString("en-GB",{month:"short",day:"numeric"})}</span>
          <span>{new Date(dateEnd).toLocaleDateString("en-GB",{month:"short",day:"numeric"})}</span>
        </div>
      )}
    </div>
  );
}

function ArcProgressRail({label,value,total,pctLabel}){
  const pct=Math.min(100,total>0?(value/total)*100:0);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <span className="label" style={{margin:0}}>{label}</span>
        <span className="mono" style={{fontSize:11,color:C.ink,fontWeight:500}}>{pctLabel}</span>
      </div>
      <div style={{position:"relative",height:3,background:C.hairline}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:C.ink,transition:"width .3s"}}/>
      </div>
    </div>
  );
}

    <div className="card" style={{marginBottom:1}}>

        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}><span className="mono" style={{fontSize:9,color:C.muted}}>LOW</span><span className="mono" style={{fontSize:9,color:C.muted}}>HIGH</span></div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><label className="label">Interest / impact</label><span className="mono" style={{fontSize:11,color:C.ink,fontWeight:500}}>{int}%</span></div>

          ))}
        </div>
      </div>
      <div style={{marginBottom:12}}><label className="label">Notes</label><textarea className="inp" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Key concerns, motivations, context..." style={{minHeight:60,resize:"vertical"}}/></div>
      <div style={{padding:"8px 12px",background:qm.bg,border:`1px solid ${qm.color}`,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span className="badge" style={{borderColor:qm.color,color:qm.color,fontSize:9}}>{q}</span>
        <span className="mono" style={{fontSize:10,color:C.ink2}}>{qm.strategy}</span>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>Cancel</button>
        <button className="btn btn-fill btn-sm" disabled={!name.trim()} onClick={()=>onAdd({name:name.trim(),role:role.trim(),department:dept.trim(),influence:inf,interest:int,sentiment:sent,notes,quadrant:q})}>{ed?"Save changes":"Add stakeholder"}</button>
      </div>
    </div>
  );
}

function App(){
  const route=useRouter();const{user,loading}=useAuth();
  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><span className="mono" style={{fontSize:12,color:C.muted}}>Loading...</span></div>;
  const needsAuth=route.startsWith("/dashboard")||route.startsWith("/map/");
  if(needsAuth&&!user){go("/login");return null;}
  const mapMatch=route.match(/^\/map\/(.+)$/);
  return(
    <div style={{minHeight:"100vh"}}>
      <Nav user={user}/>
      {route==="/"&&<HomePage/>}
      {route==="/features"&&<FeaturesPage/>}
      {route==="/pricing"&&<PricingPage/>}
      {route==="/login"&&<AuthPage mode="login"/>}
      {route==="/signup"&&<AuthPage mode="signup"/>}
      {route==="/dashboard"&&user&&<Dashboard user={user}/>}
      {mapMatch&&user&&<MapEditor mapId={mapMatch[1]} user={user}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
